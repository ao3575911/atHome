name: Feature request
description: Propose a protocol, API, SDK, docs, or web-platform improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes / tradeoffs
